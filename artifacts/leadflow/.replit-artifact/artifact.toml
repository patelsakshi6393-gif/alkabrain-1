kind = "web"
previewPath = "/"
title = "LeadFlow - Marketing Automation"
version = "1.0.0"
id = "artifacts/leadflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19378

[services.development]
run = "pnpm --filter @workspace/leadflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leadflow", "run", "build" ]
publicDir = "artifacts/leadflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19378"
BASE_PATH = "/"
