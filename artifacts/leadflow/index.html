<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- spa-github-pages redirect handler -->
    <!-- https://github.com/rafgraph/spa-github-pages -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>

    <!-- Primary SEO -->
    <title>ALKABRAIN – AI Marketing Automation for Indian SMBs</title>
    <meta name="description" content="ALKABRAIN is India's most powerful AI marketing automation platform. Find leads automatically, send bulk emails via Gmail, run WhatsApp campaigns — all in one place. Built for Indian SMBs. Start for just Rs.5." />
