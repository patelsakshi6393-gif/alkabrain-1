<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ALKABRAIN</title>
  <script>
    // GitHub Pages SPA fix - redirect 404 to index with path as query
    (function(){
      var l = window.location;
      var seg = 1; // /alkabrain-1/ = 1 path segment to keep
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g,'~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g,'~and~') : '') +
        l.hash
      );
    })();
  </script>
</head>
<body></body>
</html>
